<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DBBA USER PANEL</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body{background:#050816;color:white;font-family:sans-serif;padding:20px;}
.glow{text-shadow:0 0 10px #f59e0b,0 0 20px #f59e0b,0 0 40px #f59e0b;}
.card{background:rgba(15,23,42,.8);padding:20px;border-radius:20px;margin-bottom:20px;}
.result-tv{background:black;padding:20px;font-size:40px;font-weight:900;text-align:center;border:3px solid #f59e0b;border-radius:20px;margin-bottom:10px;letter-spacing:10px;}
.input-box{width:100%;padding:15px;font-size:24px;border-radius:15px;background:black;color:white;border:2px solid #f59e0b;outline:none;margin-bottom:15px;}
.btn{background:linear-gradient(90deg,#f59e0b,#fde047);color:black;font-weight:700;padding:16px;border-radius:15px;width:100%;cursor:pointer;border:none;font-size:18px;}
.btn:hover{box-shadow:0 0 20px #f59e0b;transform:scale(1.02);}
.history-card{background:#0f172a;padding:15px;border-radius:15px;margin-bottom:10px;}
.win{color:#22c55e;font-weight:bold;}
.loss{color:#ef4444;font-weight:bold;}
</style>
</head>
<body>

<h1 class="text-4xl glow mb-5">🎰 DBBA USER PANEL 🎰</h1>

<!-- BET PLACEMENT -->
<div class="card">
<h2 class="text-2xl glow mb-3">Place Your Bet</h2>
<input type="text" id="userBetInput" class="input-box" maxlength="10" placeholder="Enter 10-digit Bet (0-9)">
<input type="number" id="betAmount" class="input-box" placeholder="Enter Amount">
<button id="placeBetBtn" class="btn">🚀 Place Bet</button>
</div>

<!-- LIVE RESULT DISPLAY -->
<div class="card">
<h2 class="text-2xl glow mb-3">Live Result</h2>
<div id="resultTV" class="result-tv">----------</div>
</div>

<!-- REWARD DISPLAY -->
<div class="card">
<h2 class="text-2xl glow mb-3">Reward</h2>
<div id="rewardTV" class="result-tv">Waiting for result...</div>
</div>

<!-- BET HISTORY -->
<div class="card">
<h2 class="text-2xl glow mb-3">Bet History</h2>
<div id="historyDiv"></div>
</div>

<script>
// ==========================
// VARIABLES
// ==========================
let pendingBets = [];

// Reward table based on max streak
const rewardTable = {1:9,2:90,3:900,4:9000,5:90000,6:900000,7:9000000,8:90000000,9:900000000,10:9000000000};

// Load existing bet history from localStorage
let storedHistory = JSON.parse(localStorage.getItem("dbba_user_history") || "[]");
storedHistory.forEach(h => addHistory(h.bet,h.amount,h.status,h.reward));

// ==========================
// PLACE BET
// ==========================
document.getElementById("placeBetBtn").onclick = ()=>{
    const bet = document.getElementById("userBetInput").value.trim();
    const amount = parseFloat(document.getElementById("betAmount").value);
    
    if(!/^\d{10}$/.test(bet)){
        alert("Enter exactly 10 digits");
        return;
    }
    if(!amount || amount<=0){
        alert("Enter valid amount");
        return;
    }

    pendingBets.push({bet, amount});
    addHistory(bet, amount, "Pending", 0);

    document.getElementById("userBetInput").value="";
    document.getElementById("betAmount").value="";
};

// ==========================
// PROCESS RESULT
// ==========================
function processResult(result){
    document.getElementById("resultTV").innerText = result;

    pendingBets.forEach(betObj=>{
        const bet = betObj.bet;
        const amount = betObj.amount;

        let streak=0, maxStreak=0;
        for(let i=0;i<10;i++){
            if(bet[i] === result[i]){
                streak++;
                maxStreak = Math.max(maxStreak, streak);
            } else streak=0;
        }

        const multiplier = rewardTable[maxStreak] || 0;
        const winAmount = amount * multiplier;
        const status = multiplier>0?"WIN":"LOSS";

        addHistory(bet, amount, status, winAmount);

        // Update reward display (last winning streak)
        if(multiplier>0){
            document.getElementById("rewardTV").innerText = `🔥 ${maxStreak} MATCH STREAK\n🏆 Won ₹${winAmount}`;
        } else {
            document.getElementById("rewardTV").innerText = "❌ NO MATCH";
        }

        // Save history in localStorage
        storedHistory.push({bet, amount, status, reward:winAmount});
        localStorage.setItem("dbba_user_history", JSON.stringify(storedHistory));
    });

    pendingBets = [];
}

// ==========================
// HISTORY DISPLAY
// ==========================
function addHistory(bet, amount, status, reward){
    const div = document.createElement("div");
    div.className="history-card";
    div.innerHTML=`
        <div><strong>Bet:</strong> ${bet}</div>
        <div><strong>Amount:</strong> ₹${amount}</div>
        <div class="${status==="WIN"?"win":"loss"}"><strong>${status}:</strong> ${reward>0?"₹"+reward:"0"}</div>
    `;
    document.getElementById("historyDiv").prepend(div);
}

// ==========================
// POLLING LOCALSTORAGE FOR RESULT
// ==========================
setInterval(()=>{
    const result = localStorage.getItem("dbba_result");
    if(result && result.length===10){
        processResult(result);
    }
}, 2000);

</script>

</body>
</html>
